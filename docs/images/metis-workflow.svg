<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Metis workflow</title>
  <desc id="desc">Three aligned steps: Understand, Build, and Verify.</desc>
  <style>
    :root { color-scheme: light dark; --text:#111827; --muted:#4b5563; --line:#9ca3af; --border:#d1d5db; --soft:#f3f4f6; }
    @media (prefers-color-scheme: dark) { :root { --text:#f3f4f6; --muted:#b6c0ce; --line:#94a3b8; --border:#475569; --soft:#253044; } }
    .text{fill:var(--text)} .muted{fill:var(--muted)} .card{fill:none;stroke:var(--border)} .soft{fill:var(--soft)} .line{fill:none;stroke:var(--line)}
  </style>
  <g font-family="Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">
    <text class="text" x="600" y="30" text-anchor="middle" font-size="21" font-weight="700" letter-spacing="1.2">FROM CONTEXT TO CONFIDENCE</text>
    <text class="muted" x="600" y="56" text-anchor="middle" font-size="14">A consistent loop for repository work</text>
    <g class="line" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M370 163h60"/><path d="m420 153 10 10-10 10"/>
      <path d="M770 163h60"/><path d="m820 153 10 10-10 10"/>
    </g>
    <g transform="translate(40 88)">
      <rect class="card" width="320" height="150" rx="16"/>
      <rect class="soft" x="24" y="24" width="42" height="42" rx="21"/>
      <text class="text" x="45" y="51" text-anchor="middle" font-size="14" font-weight="700">01</text>
      <text class="text" x="82" y="50" font-size="18" font-weight="700">Understand</text>
      <text class="muted" x="24" y="96" font-size="14"><tspan x="24">Read files, search code, and map</tspan><tspan x="24" dy="22">the conventions already in place.</tspan></text>
    </g>
    <g transform="translate(440 88)">
      <rect class="card" width="320" height="150" rx="16"/>
      <rect class="soft" x="24" y="24" width="42" height="42" rx="21"/>
      <text class="text" x="45" y="51" text-anchor="middle" font-size="14" font-weight="700">02</text>
      <text class="text" x="82" y="50" font-size="18" font-weight="700">Build</text>
      <text class="muted" x="24" y="96" font-size="14"><tspan x="24">Make focused edits and run the</tspan><tspan x="24" dy="22">tools needed to move forward.</tspan></text>
    </g>
    <g transform="translate(840 88)">
      <rect class="card" width="320" height="150" rx="16"/>
      <rect class="soft" x="24" y="24" width="42" height="42" rx="21"/>
      <text class="text" x="45" y="51" text-anchor="middle" font-size="14" font-weight="700">03</text>
      <text class="text" x="82" y="50" font-size="18" font-weight="700">Verify</text>
      <text class="muted" x="24" y="96" font-size="14"><tspan x="24">Run checks, inspect output, and</tspan><tspan x="24" dy="22">confirm the result is ready.</tspan></text>
    </g>
  </g>
</svg>
