<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 270" role="img" aria-labelledby="title desc">
  <title id="title">Same task, less time</title>
  <desc id="desc">One user test measured Metis at one minute thirty seconds and OpenCode at three minutes thirty seconds, with no observed accuracy difference.</desc>
  <style>
    :root { color-scheme: light dark; --text:#111827; --muted:#4b5563; --border:#d1d5db; --strong:#374151; --soft:#e5e7eb; }
    @media (prefers-color-scheme: dark) { :root { --text:#f3f4f6; --muted:#b6c0ce; --border:#475569; --strong:#e2e8f0; --soft:#334155; } }
    .text{fill:var(--text)} .muted{fill:var(--muted)} .strong{fill:var(--strong)} .soft{fill:var(--soft)} .line{stroke:var(--border)}
  </style>
  <g font-family="Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',sans-serif">
    <text class="text" x="600" y="31" text-anchor="middle" font-size="21" font-weight="700" letter-spacing="1.2">SAME TASK, LESS TIME</text>
    <text class="muted" x="600" y="57" text-anchor="middle" font-size="14">One user test · no observed accuracy difference</text>
    <text class="text" x="55" y="116" font-size="17" font-weight="700">Metis</text>
    <rect class="soft" x="180" y="91" width="360" height="36" rx="10"/>
    <text class="text" x="558" y="116" font-size="17" font-weight="700">1m 30s</text>
    <text class="text" x="55" y="180" font-size="17" font-weight="700">OpenCode</text>
    <rect class="strong" x="180" y="155" width="840" height="36" rx="10"/>
    <text class="text" x="1038" y="180" font-size="17" font-weight="700">3m 30s</text>
    <line class="line" x1="180" y1="216" x2="1020" y2="216"/>
    <text class="muted" x="180" y="243" font-size="13">0</text>
    <text class="muted" x="1020" y="243" text-anchor="end" font-size="13">210 seconds</text>
  </g>
</svg>
